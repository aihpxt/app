spring:
  application:
    name: aiphxt-backend
  datasource:
    url: jdbc:sqlite:${DB_PATH:../ai-service/sqlite/data/unified_school_data.db}
    driver-class-name: org.sqlite.JDBC
  sql:
    init:
      mode: never
  jpa:
    database-platform: com.aiphxt.config.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        cache:
          use_second_level_cache: false
          use_query_cache: false
        naming:
          physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        temp:
          use_jdbc_metadata_defaults: false

logging:
  level:
    org.hibernate: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type: TRACE
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: your-github-client-id
            client-secret: your-github-client-secret
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - user:email
              - read:user

server:
  port: 8081
  servlet:
    context-path: /api

ai:
  service:
    url: http://localhost:8000

jwt:
  secret: ${JWT_SECRET:your-secret-key}
  expiration: 3600000

security:
  headers:
    x-content-type-options: nosniff
    x-xss-protection: 1; mode=block
    x-frame-options: DENY
    content-security-policy: default-src 'self'

---
spring:
  config:
    activate:
      on-profile: production
  datasource:
    url: jdbc:sqlite:./data/aiphxt.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - user:email
              - read:user

server:
  port: 8081
  servlet:
    context-path: /api
  compression:
    enabled: true
  http2:
    enabled: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000

ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:8000}

logging:
  level:
    root: warn
    com.aiphxt: info