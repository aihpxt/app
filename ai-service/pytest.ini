[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes
    --maxfail=5
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
    network: 网络测试
    cache: 缓存测试
    circuit_breaker: 熔断器测试
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
